<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEON-YUL Player</title>
    <link rel="stylesheet" href="css/player.css" />
  </head>
  <body>
    <main class="page">
      <section class="music-box">
        <img
          id="musicImage"
          src="images/spots/image 13.png"
          alt="장소 이미지"
        />

        <div class="music-overlay">
          <div class="icon-row">
            <button id="backButton" class="icon-button" type="button" aria-label="뒤로가기">
              <img class="icon-img" src="images/icon/Left 2.png" alt="" />
            </button>
            <div class="menu-icons">
              <button class="icon-button" type="button" aria-label="저장">
                <img class="icon-img" src="images/icon/Bookmark.png" alt="" />
              </button>
              <button class="icon-button" type="button" aria-label="공유">
                <img class="icon-img" src="images/icon/Share.png" alt="" />
              </button>
            </div>
          </div>

          <div class="music-text">
            <h2 id="musicTitle">경복궁의 아침</h2>
            <span id="musicSub">SEON-YUL AI Orchestration</span>
          </div>

          <button id="playButton" class="play-button" type="button" aria-label="재생">=</button>
          <div class="progress-bar"><span></span></div>
        </div>

        <audio id="audio" src=""></audio>
      </section>

      <section class="place-box">
        <p class="place-label">Place in <b>SEON-YUL</b></p>

        <h1>
          <span id="placeName">경복궁</span>
          <span id="placeEnglish">Gyeongbokgung</span>
        </h1>

        <div class="tag-box" id="tagBox">
          <span>역사/문화</span>
          <span>종로구</span>
        </div>

        <p id="placeDesc" class="desc">
          조선 시대를 대표하는 궁궐로, 아름다운 건축과 역사를 함께 느낄 수 있는 곳이에요.
          경회루와 향원정은 꼭 방문해보세요.
        </p>
      </section>

      <section class="photo-box">
        <img id="placeImage" src="images/spots/image 7.png" alt="장소 사진" />
        <button class="next-photo" type="button" aria-label="다음 사진">›</button>
        <div class="dots" aria-hidden="true">
          <span class="active"></span>
          <span></span>
          <span></span>
        </div>
      </section>

      <section class="info-box">
        <p><span><img src="images/icon/Coupon 3.png" alt="" />입장료</span><b id="fee">3,000 KRW</b></p>
        <p><span><img src="images/icon/Alarm clock.png" alt="" />운영시간</span><b id="time">09:00 - 18:00 (매주 화요일 휴무)</b></p>
        <p><span><img src="images/icon/Location.png" alt="" />위치</span><b id="location">서울특별시 종로구 사직로 161</b></p>
      </section>

      <section class="my-seonyul-box" aria-label="내 SEON-YUL 노래">
        <h2>MY SEON-YUL</h2>
        <div id="mySeonyulSong" class="my-song-field">파일을 올려주세요</div>
        <a href="#" class="other-seonyul-link">다른 사람의 SEON-YUL 확인하기 <span aria-hidden="true">›</span></a>
      </section>

      <button id="addSongButton" class="add-button" type="button"><img src="images/icon/Flag.png" alt="" />노래 추가하기</button>
    </main>

    <script src="js/data.js"></script>
    <script src="js/player.js"></script>
  </body>
</html>
