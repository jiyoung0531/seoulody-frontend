<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seon-yul 회원가입</title>
  <link rel="stylesheet" href="signup.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="app-container">

    <div class="logo-area">
      <img src="../images/logo.png" alt="SEON-YUL 로고" class="app-logo">
    </div>

    <!-- 📜 본문 컨텐츠 영역 시작 -->
    <div class="main-content">
      
      <p class="page-desc">본인확인을 위해 이메일 인증을 진행해주세요.</p>

      <form id="signup-form" novalidate>
        
        <!-- 첫 번째 상자 -->
        <div class="form-group-box">
          <div class="input-row">
            <div class="input-left">
              <i class="fa-regular fa-user input-icon"></i>
              <input type="text" id="user-id" placeholder="아이디" required>
            </div>
            <button type="button" class="inline-btn" id="btn-check-id">중복확인</button>
          </div>

          <div class="input-row no-border">
            <div class="input-left">
              <i class="fa-solid fa-lock input-icon"></i>
              <input type="password" id="user-pw" placeholder="비밀번호" required>
            </div>
          </div>

          <div class="pw-requirements">
            <div class="req-item" id="req-length"><span class="check-mark">✓</span> 최소 8자 이상</div>
            <div class="req-item" id="req-upper"><span class="check-mark">✓</span> 대문자 포함</div>
            <div class="req-item" id="req-special"><span class="check-mark">✓</span> 특수기호 포함</div>
          </div>

          <div class="input-row password-confirm-row">
            <div class="input-left">
              <i class="fa-regular fa-circle-check input-icon"></i>
              <input type="password" id="user-pw-confirm" placeholder="비밀번호 확인" required>
            </div>
          </div>
        </div>

        <!-- 두 번째 상자 -->
        <div class="form-group-box">
          <div class="input-row">
            <div class="input-left">
              <i class="fa-regular fa-user input-icon"></i>
              <input type="text" id="user-name" placeholder="이름" required>
            </div>
          </div>

          <div class="input-row">
            <div class="input-left">
              <i class="fa-regular fa-envelope input-icon"></i>
              <input type="email" id="user-email" placeholder="email" required>
            </div>
            <button type="button" class="inline-btn" id="btn-request-email">인증요청</button>
          </div>

          <div class="input-row no-border">
            <div class="input-left">
              <i class="fa-regular fa-circle-check input-icon"></i>
              <input type="text" id="auth-code" placeholder="인증코드" required>
            </div>
            <button type="button" class="inline-btn" id="btn-verify-code">확인</button>
          </div>
        </div>

      </form>

      <!-- 📥 [위치 수정] 하단 버튼 구역을 .main-content 방 안으로 이사시켰습니다! -->
      <div class="bottom-btn-area">
        <button type="submit" form="signup-form" class="submit-btn clickable-box" id="btn-submit" disabled>회원가입하기</button>
      </div>

    </div> <!-- 👈 .main-content 방이 모든 요소들을 품고 여기서 닫힙니다! -->

  </div> <!-- 👈 .app-container 끝 -->

</body>
</html>
