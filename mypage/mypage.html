<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서울의 선율 - 마이페이지</title>
  <link rel="stylesheet" href="mypage.css">
</head>
<body>

  <div class="app-container">

    <div class="page-header">
      <h1 class="page-title">마이페이지</h1>
    </div>

    <div class="main-content">
      
      <div class="profile-section setting-group">
        <div class="profile-circle">
          <button class="edit-btn">✏️</button>
        </div>
        <h2 class="profile-name">홍길동</h2>
      </div>

      <div class="setting-group">
        <h3>앱 설정</h3>
        <ul>
          <li>MY SEON-YUL 관리</li>
          <li>댓글 관리</li>
          <li>알림 설정</li>
          <li>지도 설정</li>
          <li>테마</li>
        </ul>
      </div>

      <div class="setting-group">
        <h3>계정</h3>
        <ul>
          <li>내 아이디</li>
          <li>비밀번호 변경</li>
          <li>이메일 변경</li>
        </ul>
      </div>

      <div class="setting-group">
        <h3>약관 및 정책</h3>
        <ul>
          <li class="flex-row"><span>앱 버전</span><span class="version-text">1.1.1</span></li>
          <li>서비스 이용약관</li>
          <li>개인정보 처리 방침</li>
          <li>오픈소스 정보</li>
        </ul>
      </div>

      <div class="setting-group">
        <h3>고객 지원</h3>
        <ul>
          <li>문의하기</li>
          <li>공지사항</li>
          <li>도움말</li>
        </ul>
      </div>

      <div class="setting-group">
        <h3>기타</h3>
        <ul>
          <li>회원 탈퇴</li>
          <li>로그아웃</li>
        </ul>
      </div>

       </div>

   
         <nav class="bottom-nav">
      <div class="nav-tab clickable-box"  id="box-nav-home">
        <img class="nav-icon" src="../images/Home_stroke.png"/>
        <span class="nav-text">홈</span>
      </div>

      <div class="nav-tab clickable-box" id="box-nav-map">
        <img class="nav-icon" src="../images/map_stroke.png"/>
        <span class="nav-text">지도</span>
      </div>

      <div class="nav-center">
        <img src="../images/mainbtn.png">
      </div>

      <div class="nav-tab clickable-box"  id="box-nav-save">
       <img class="nav-icon" src="../images/Bookmark_light.png"/>
        <span class="nav-text">저장</span>
      </div>
      
      <div class="nav-tab clickable-box"  id="box-nav-mypage">
        <img class="nav-icon" src="../images/User.png"/>
        <span class="nav-text">마이</span>
      </div>
    </nav>
  </div>

  </div>

    <script src="mypage.js"></script>
</body>
</html>
